<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RG 29 - Controle de Ocorrências</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif); color: var(--color-text-primary, #333); background: linear-gradient(135deg, #000080 0%, #000050 100%); min-height: 100vh; }
        
        /* Ajustando as margens para não ficarem muito largas */
        .container { max-width: 850px; margin: 0 auto; padding: 15px; }
        
        /* Layout flexível para alinhar o logo ao lado do título */
        .header-container { display: flex; align-items: center; gap: 15px; margin-bottom: 24px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .logo-box { display: flex; align-items: center; flex-shrink: 0; }
        .logo-box img { height: 45px; width: auto; display: block; }
        .header { margin-bottom: 0; border-bottom: none; padding-bottom: 0; text-align: left; }
        
        .header h1 { font-size: 28px; font-weight: 800; text-transform: uppercase; color: #000080; letter-spacing: 0.5px; font-family: 'Georgia', 'Trebuchet MS', 'Segoe UI', sans-serif; margin: 0; }
        .header p { font-size: 13px; color: var(--color-text-secondary, #666); margin-top: 4px; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: none; }
        .tab-btn { padding: 12px 20px; border: none; background: rgba(255, 255, 255, 0.2); cursor: pointer; font-size: 14px; font-weight: 500; color: white; border-radius: 6px 6px 0 0; transition: all 0.3s; }
        .tab-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .tab-btn.active { background: white; color: #000080; border-bottom: none; }

        .form-card { background: var(--color-background-primary, #fff); border: 0.5px solid var(--color-border-tertiary, #ccc); border-radius: var(--border-radius-lg, 8px); padding: 20px; margin-bottom: 20px; }
        .form-card h3 { font-size: 16px; font-weight: 500; margin-bottom: 16px; }

        .form-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 0.5px solid var(--color-border-tertiary, #ccc); }
        .form-section:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }

        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .form-row.col3 { grid-template-columns: repeat(3, 1fr); }

        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--color-text-primary, #333); }
        .form-group label .required { color: var(--color-text-danger, red); }
        .form-group input, .form-group select, .form-group textarea { padding: 8px 12px; border: 0.5px solid var(--color-border-tertiary, #ccc); border-radius: var(--border-radius-md, 4px); font-size: 14px; font-family: var(--font-sans, inherit); }
        .form-group textarea { resize: vertical; min-height: 60px; }

        .btn-group { display: flex; gap: 12px; margin-top: 20px; }
        .btn { padding: 10px 16px; border: 0.5px solid var(--color-border-secondary, #ccc); border-radius: var(--border-radius-md, 4px); background: transparent; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn:hover { background: var(--color-background-secondary, #eee); }
        .btn-primary { background: var(--color-background-info, #0056b3); color: var(--color-text-info, #fff); border-color: var(--color-border-info, #0056b3); }
        .btn-primary:hover { opacity: 0.9; }

        .table-wrapper { overflow-x: auto; }
        .table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .table th { background: var(--color-background-secondary, #eee); padding: 12px 8px; text-align: left; font-weight: 500; border-bottom: 0.5px solid var(--color-border-tertiary, #ccc); }
        .table td { padding: 12px 8px; border-bottom: 0.5px solid var(--color-border-tertiary, #ccc); }
        .table tr:hover { background: var(--color-background-secondary, #eee); }

        .badge { display: inline-block; padding: 4px 10px; border-radius: var(--border-radius-md, 4px); font-size: 11px; font-weight: 500; }
        .badge-aberta { background: var(--color-background-warning, #fff3cd); color: var(--color-text-warning, #856404); }
        .badge-fechada { background: var(--color-background-success, #d4edda); color: var(--color-text-success, #155724); }
        .badge-sim { background: var(--color-background-success, #d4edda); color: var(--color-text-success, #155724); }
        .badge-nao { background: var(--color-background-info, #cff4fc); color: var(--color-text-info, #055160); }
        .badge-com { background: var(--color-background-danger, #f8d7da); color: var(--color-text-danger, #842029); }
        .badge-sem { background: var(--color-background-success, #d4edda); color: var(--color-text-success, #155724); }

        .form-row.full { grid-template-columns: 1fr; }
        .btn-edit, .btn-delete { padding: 4px 8px; font-size: 11px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>

  <div class="tab-content active" id="novo">
    <div class="form-card">
      <h3>Nova ocorrência</h3>
      
      <div class="form-section">
        <h4 style="font-size: 14px; font-weight: 500; margin-bottom: 12px; color: var(--color-text-secondary, #666);">Identificação</h4>
        <div class="form-row col3">
          <div class="form-group">
            <label>Número <span class="required">*</span></label>
            <input type="text" id="numero" readonly style="background: var(--color-background-secondary, #eee);">
          </div>
          <div class="form-group">
            <label>Data da ocorrência <span class="required">*</span></label>
            <input type="date" id="data">
          </div>
          <div class="form-group">
            <label>Unidade causadora <span class="required">*</span></label>
            <select id="unidade">
              <option value="">Selecione...</option>
              <option value="CXS">CXS</option>
              <option value="LGS">LGS</option>
              <option value="FLN">FLN</option>
              <option value="ARR">ARR</option>
              <option value="JAG">JAG</option>
              <option value="JVL">JVL</option>
              <option value="CRC">CRC</option>
              <option value="BRQ">BRQ</option>
              <option value="TBO">TBO</option>
              <option value="TUB">TUB</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h4 style="font-size: 14px; font-weight: 500; margin-bottom: 12px; color: var(--color-text-secondary, #666);">Documento e transporte</h4>
        <div class="form-row col3">
          <div class="form-group">
            <label>NF-e</label>
            <input type="text" id="nfe" placeholder="Opcional">
          </div>
          <div class="form-group">
            <label>CT-e <span class="required">*</span></label>
            <input type="text" id="cte" placeholder="Obrigatório">
          </div>
        </div>
      </div>

      <div class="form-section">
        <h4 style="font-size: 14px; font-weight: 500; margin-bottom: 12px; color: var(--color-text-secondary, #666);">Informações da carga</h4>
        <div class="form-row col3">
          <div class="form-group">
            <label>Remetente</label>
            <input type="text" id="remetente" placeholder="Opcional">
          </div>
          <div class="form-group">
            <label>Destinatário</label>
            <input type="text" id="destinatario" placeholder="Opcional">
          </div>
          <div class="form-group">
            <label>Volumes</label>
            <input type="number" id="volumes" min="0" placeholder="Opcional">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Volumes com problema</label>
            <input type="number" id="volumesProblema" min="0" placeholder="Opcional">
          </div>
        </div>
      </div>

            <option value="SEM PALETIZAR">SEM PALETIZAR</option>
            <option value="SEM RASTREAMENTO">SEM RASTREAMENTO</option>
            <option value="SEM UNITIZAR">SEM UNITIZAR</option>
            <option value="SOBRA DE VOLUMES">SOBRA DE VOLUMES</option>
            <option value="TROCA DE MERCADORIA">TROCA DE MERCADORIA</option>
            <option value="VEÍCULO SEM ESTAR LIMPO">VEÍCULO SEM ESTAR LIMPO</option>
          </select>
        </div>
      </div>

      <div class="form-section">
        <h4 style="font-size: 14px; font-weight: 500; margin-bottom: 12px; color: var(--color-text-secondary, #666);">Correção e responsável</h4>
        <div class="form-group" style="margin-bottom: 12px;">
          <label>Causador <span style="color: var(--color-text-secondary, #666); font-weight: normal;">(opcional)</span></label>
          <input type="text" id="causador" placeholder="Opcional">
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
          <label>Correção imediata <span class="required">*</span></label>
          <textarea id="correcao" placeholder="Descreva o que foi feito para corrigir o problema..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Responsável pela correção <span class="required">*</span></label>
            <input type="text" id="responsavel" placeholder="Pessoa responsável para corrigir o problema">
          </div>
          <div class="form-group">
            <label>Data da solução <span style="color: var(--color-text-secondary, #666); font-weight: normal;">(preenche depois)</span></label>
            <input type="date" id="dataSolucao">
          </div>
        </div>
      </div>

      <div class="form-section">
        <h4 style="font-size: 14px; font-weight: 500; margin-bottom: 12px; color: var(--color-text-secondary, #666);">Cliente e ressalva</h4>
        <div class="form-row">
          <div class="form-group">
            <label>Houve contato com o cliente <span class="required">*</span></label>
            <select id="contato">
              <option value="">Selecione...</option>
              <option value="sim">Sim</option>
              <option value="nao">Não</option>
            </select>
          </div>
          <div class="form-group">
            <label>Ressalva <span class="required">*</span></label>
            <select id="ressalva">
              <option value="">Selecione...</option>
              <option value="com">Com ressalva</option>
              <option value="sem">Sem ressalva</option>
            </select>
          </div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="salvarOcorrencia()">Salvar ocorrência</button>
        <button class="btn" onclick="limparFormulario()">Limpar</button>
      </div>
    </div>
  </div>

  <div class="tab-content" id="lista">
    <div class="form-card">
      <h3>Ocorrências registradas</h3>
      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>Nº</th>
              <th>Data</th>
              <th>Unidade</th>
              <th>Resumo</th>
              <th>Destinatário</th>
              <th>Contato cliente</th>
              <th>Ressalva</th>
              <th>Status</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="tabela-ocorrencias"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const UNIDADES = ['CXS', 'LGS', 'FLN', 'ARR', 'JAG', 'JVL', 'CRC', 'BRQ', 'TBO', 'TUB'];
let dados = [];

function carregarDados() {
  const saved = localStorage.getItem('rg29_dados');
  if (saved) dados = JSON.parse(saved);
  atualizarNumero();
}

function salvarDados() {
  localStorage.setItem('rg29_dados', JSON.stringify(dados));
}

function atualizarNumero() {
  const proximo = dados.length + 1;
  document.getElementById('numero').value = proximo.toString().padStart(3, '0');
}

function mudarAba(aba, botao) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(aba).classList.add('active');
  if (botao) {
    botao.classList.add('active');
  } else {
    // Caso venha da edição
    document.querySelectorAll('.tab-btn')[0].add('active');
  }
  if (aba === 'lista') renderizarTabela();
}

function validarObrigatorios() {
  const campos = ['data', 'unidade', 'cte', 'reclamacao', 'resumo', 'correcao', 'responsavel', 'contato', 'ressalva'];
  for (let campo of campos) {
    if (!document.getElementById(campo).value) {
      alert('Campo obrigatório: ' + campo);
      return false;
    }
  }
  return true;
}

function salvarOcorrencia() {
  if (!validarObrigatorios()) return;

  const ocorrencia = {
    numero: document.getElementById('numero').value,
    data: document.getElementById('data').value,
    nfe: document.getElementById('nfe').value || null,
    cte: document.getElementById('cte').value || null,
    remetente: document.getElementById('remetente').value || null,
    destinatario: document.getElementById('destinatario').value,
    volumes: document.getElementById('volumes').value || null,
    volumesProblema: document.getElementById('volumesProblema').value || null,
    reclamacao: document.getElementById('reclamacao').value,
    resumo: document.getElementById('resumo').value,
    unidade: document.getElementById('unidade').value,
    causador: document.getElementById('causador').value || null,
    correcao: document.getElementById('correcao').value,
    responsavel: document.getElementById('responsavel').value,
    dataSolucao: document.getElementById('dataSolucao').value || null,
    contato: document.getElementById('contato').value,
    ressalva: document.getElementById('ressalva').value,
    status: document.getElementById('dataSolucao').value ? 'fechada' : 'aberta',
    dataCriacao: new Date().toISOString()
  };

  dados.push(ocorrencia);
  salvarDados();
  alert('Ocorrência salva com sucesso!');
  limparFormulario();
  atualizarNumero();
}

function limparFormulario() {
  document.getElementById('data').value = new Date().toISOString().split('T')[0];
  document.getElementById('nfe').value = '';
  document.getElementById('cte').value = '';
  document.getElementById('remetente').value = '';
  document.getElementById('destinatario').value = '';
  document.getElementById('volumes').value = '';
  document.getElementById('volumesProblema').value = '';
  document.getElementById('reclamacao').value = '';
  document.getElementById('resumo').value = '';
  document.getElementById('unidade').value = '';
  document.getElementById('causador').value = '';
  document.getElementById('correcao').value = '';
  document.getElementById('responsavel').value = '';
  document.getElementById('dataSolucao').value = '';
  document.getElementById('contato').value = '';
  document.getElementById('ressalva').value = '';
  atualizarNumero();
}

function renderizarTabela() {
  const tbody = document.getElementById('tabela-ocorrencias');
  tbody.innerHTML = dados.map(o => {
    return '<tr>' +
      '<td>' + o.numero + '</td>' +
      '<td>' + new Date(o.data).toLocaleDateString('pt-BR') + '</td>' +
      '<td>' + o.unidade + '</td>' +
      '<td>' + o.resumo.substring(0, 25) + '...</td>' +
      '<td>' + o.destinatario.substring(0, 25) + '...</td>' +
      '<td><span class="badge badge-' + (o.contato === 'sim' ? 'sim' : 'nao') + '">' + (o.contato === 'sim' ? 'Sim' : 'Não') + '</span></td>' +
      '<td><span class="badge badge-' + (o.ressalva === 'com' ? 'com' : 'sem') + '">' + (o.ressalva === 'com' ? 'Com' : 'Sem') + '</span></td>' +
      '<td><span class="badge badge-' + o.status + '">' + (o.status === 'aberta' ? 'Aberta' : 'Fechada') + '</span></td>' +
      '<td><button class="btn btn-edit" onclick="editarOcorrencia(' + dados.indexOf(o) + ')">Editar</button></td>' +
    '</tr>';
  }).join('');
}

function editarOcorrencia(index) {
  const o = dados[index];
  document.getElementById('numero').value = o.numero;
  document.getElementById('data').value = o.data;
  document.getElementById('nfe').value = o.nfe || '';
  document.getElementById('cte').value = o.cte || '';
  document.getElementById('remetente').value = o.remetente || '';
  document.getElementById('destinatario').value = o.destinatario;
  document.getElementById('volumes').value = o.volumes || '';
  document.getElementById('volumesProblema').value = o.volumesProblema || '';
  document.getElementById('reclamacao').value = o.reclamacao;
  document.getElementById('resumo').value = o.resumo;
  document.getElementById('unidade').value = o.unidade;
  document.getElementById('causador').value = o.causador || '';
  document.getElementById('correcao').value = o.correcao;
  document.getElementById('responsavel').value = o.responsavel;
  document.getElementById('dataSolucao').value = o.dataSolucao || '';
  document.getElementById('contato').value = o.contato;
  document.getElementById('ressalva').value = o.ressalva;
  
  mudarAba('novo', document.querySelectorAll('.tab-btn')[0]);
  
  const btn = document.querySelector('.btn-primary');
  btn.textContent = 'Atualizar ocorrência';
  btn.onclick = () => atualizarOcorrencia(index);
}

function atualizarOcorrencia(index) {
  if (!validarObrigatorios()) return;
  
  const dataSolucao = document.getElementById('dataSolucao').value;
  
  dados[index] = {
    ...dados[index],
    data: document.getElementById('data').value,
    nfe: document.getElementById('nfe').value || null,
    cte: document.getElementById('cte').value || null,
    remetente: document.getElementById('remetente').value || null,
    destinatario: document.getElementById('destinatario').value,
    volumes: document.getElementById('volumes').value || null,
    volumesProblema: document.getElementById('volumesProblema').value || null,
    reclamacao: document.getElementById('reclamacao').value,
    resumo: document.getElementById('resumo').value,
    unidade: document.getElementById('unidade').value,
    causador: document.getElementById('causador').value || null,
    correcao: document.getElementById('correcao').value,
    responsavel: document.getElementById('responsavel').value,
    dataSolucao: dataSolucao || null,
    contato: document.getElementById('contato').value,
    ressalva: document.getElementById('ressalva').value,
    status: dataSolucao ? 'fechada' : 'aberta'
  };
  
  salvarDados();
  alert('Ocorrência atualizada!');
  limparFormulario();
  const btn = document.querySelector('.btn-primary');
  btn.textContent = 'Salvar ocorrência';
  btn.onclick = () => salvarOcorrencia();
}

document.getElementById('data').valueAsDate = new Date();
carregarDados();
</script>
</body>
</html>
